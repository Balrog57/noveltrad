appId: com.balrog57.noveltrad
productName: NovelTrad
icon: build/icon.png
copyright: Copyright © 2026 Balrog57
asar: true
electronVersion: 31.1.0
directories:
  output: dist
  buildResources: build
files:
  - "out/**/*"
  - "node_modules/**/*"
  - "build/**/*"
  - "resources/**/*"
publish:
  - provider: github
    owner: Balrog57
    repo: noveltrad
    releaseType: release
# Code signing : non activé (décision produit). Les builds sont non signés ;
# Windows SmartScreen affichera un avertissement au premier lancement.
win:
  target:
    - nsis
mac:
  target:
    - dmg
linux:
  target:
    - AppImage
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: NovelTrad
  uninstallDisplayName: NovelTrad
  createDesktopShortcut: always
  createStartMenuShortcut: true
  artifactName: "${productName}-${version}-setup.${ext}"
