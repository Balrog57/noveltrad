appId: com.balrog57.noveltrad
productName: NovelTrad
icon: build/icon.png
copyright: Copyright © 2026 Balrog57
asar: true
electronVersion: 31.1.0
forceCodeSigning: false
directories:
  output: dist
  buildResources: build
files:
  - "out/**/*"
  - "build/**/*"
  - "resources/**/*"
publish:
  - provider: github
    owner: Balrog57
    repo: noveltrad
    releaseType: release
win:
  target:
    - nsis
  verifyUpdateCodeSignature: false
  signAndEditExecutable: false
mac:
  target:
    - dmg
linux:
  target:
    - AppImage
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: NovelTrad
  uninstallDisplayName: NovelTrad
  createDesktopShortcut: always
  createStartMenuShortcut: true
  artifactName: '${productName}-${version}-setup.${ext}'

