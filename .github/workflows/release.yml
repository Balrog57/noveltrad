name: Release

# Build the Windows .exe on a tag push and attach the zipped bundle to the
# GitHub Release. This is what the in-app auto-update downloads.
on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write  # needed by softprops/action-gh-release to upload assets

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13 && uv python pin 3.13

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build .exe (PyInstaller)
        run: uv run pyinstaller noveltrad.spec --clean --noconfirm

      - name: Zip the bundle
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $zip = "AgentTranslate-${version}-windows-x64.zip"
          Compress-Archive -Path dist/AgentTranslate/* -DestinationPath $zip
          Write-Output "ZIP_NAME=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload asset to the release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          fail_on_unmatched_files: true
