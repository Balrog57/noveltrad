name: Build & Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build:
    name: Build setup EXE
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Verify tag matches source version
        run: |
          $tagVersion = "${{ github.ref_name }}".TrimStart('v')
          $srcVersion = python -c "import src; print(src.__version__, end='')"
          if ($tagVersion -ne $srcVersion) {
            Write-Error "Tag ${{ github.ref_name }} (=$tagVersion) does not match src.__version__ (=$srcVersion). Bump src/__init__.py first."
            exit 1
          }
          Write-Host "Tag matches source version: $tagVersion"

      - name: Build with PyInstaller
        run: pyinstaller build.spec --noconfirm

      - name: Write VERSION
        run: python -c "from pathlib import Path; import src; (Path('dist') / 'NovelTrad' / 'VERSION').write_text(src.__version__ + '\n')"

      - name: Build Inno Setup installer
        run: |
          $version = python -c "import src; print(src.__version__, end='')"
          echo "NOVELTRAD_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DNOVELTRAD_VERSION=$version" NovelTrad.iss

      - name: Upload installer to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $setup_exe = "Setup_NovelTrad-v$env:NOVELTRAD_VERSION.exe"
          gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --notes "Build automatique" --latest || true
          gh release upload ${{ github.ref_name }} "$setup_exe" --clobber

      - name: Generate latest.json manifest
        run: |
          # Regenerate latest.json from the freshly built installer so the
          # auto-updater sees the correct version + sha256 + download_url
          # on every release. We do NOT trust the repo-root latest.json
          # because it is always at least one release behind.
          $setupExe = "Setup_NovelTrad-v$env:NOVELTRAD_VERSION.exe"
          $sha = (Get-FileHash -LiteralPath $setupExe -Algorithm SHA256).Hash.ToLower()
          $now = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $json = @{
            version       = $env:NOVELTRAD_VERSION
            release_date  = $now
            download_url  = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$setupExe"
            sha256        = $sha
          } | ConvertTo-Json -Depth 5
          $json | Out-File -FilePath latest.json -Encoding utf8 -NoNewline
          Write-Host "Generated latest.json: $json"

      - name: Upload latest.json manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if (Test-Path -LiteralPath "latest.json") {
            gh release upload ${{ github.ref_name }} "latest.json" --clobber
          } else {
            Write-Host "latest.json not found in repo root; skipping manifest upload."
          }
