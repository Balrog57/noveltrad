name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build EXE
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller build.spec --noconfirm

      - name: Show dist folder
        run: |
          ls -R dist/NovelTrad/
          echo ""
          echo "EXE size:"
          wc -c dist/NovelTrad/NovelTrad.exe

      - name: Upload EXE to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --notes "Build automatique" --latest || true
          gh release upload ${{ github.ref_name }} dist/NovelTrad/NovelTrad.exe --clobber
