name: NovelTrad release

on:
    push:
        tags:
            - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
    contents: write

jobs:
    build:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install runtime + PyInstaller + build
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install pyinstaller build

            - name: Compile sources
              run: python -m compileall src

            - name: Run unit tests
              env:
                  NOVELTRAD_FAKE_LLM: "1"
                  NOVELTRAD_TRANSLATION_TEST_MODE: "1"
              run: python -m unittest discover -s tests -p "test_*.py"

            - name: Install Inno Setup 6
              shell: pwsh
              run: |
                  $url = 'https://jrsoftware.org/download.php/is.exe'
                  $installer = Join-Path $env:TEMP 'is.exe'
                  Invoke-WebRequest -Uri $url -OutFile $installer
                  $proc = Start-Process -FilePath $installer -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART' -Wait -PassThru
                  Write-Host ("Inno Setup installer exit code: {0}" -f $proc.ExitCode)
                  $candidates = @(
                      'C:\Program Files (x86)\Inno Setup 6\ISCC.exe',
                      'C:\Program Files\Inno Setup 6\ISCC.exe',
                      'C:\Inno Setup 6\ISCC.exe'
                  )
                  $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
                  if (-not $iscc) { throw "ISCC.exe not found in any of: $($candidates -join ', ')" }
                  Write-Host "Using ISCC at $iscc"
                  # Expose the resolved ISCC path to subsequent steps.
                  "iscc=$iscc" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
                  # Add Inno Setup's directory to PATH for this and later steps.
                  $isccDir = Split-Path $iscc -Parent
                  Add-Content -Path $env:GITHUB_PATH -Value $isccDir

            - name: Run build.py --all
              env:
                  NOVELTRAD_VERSION: ${{ github.ref_name }}
              shell: pwsh
              run: |
                  $env:NOVELTRAD_VERSION = "${{ github.ref_name }}".TrimStart('v')
                  python build.py --all

            - name: Compute SHA256 of installer
              id: sha
              shell: pwsh
              run: |
                  $ver = "${{ github.ref_name }}".TrimStart('v')
                  $path = "Setup_NovelTrad-v$ver.exe"
                  if (-not (Test-Path $path)) { throw "Installer not found: $path" }
                  $h = (Get-FileHash -Path $path -Algorithm SHA256).Hash.ToLower()
                  "sha256=$h" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
                  Copy-Item $path $env:GITHUB_WORKSPACE\Setup_NovelTrad.exe -Force
                  Write-Host "sha256=$h"

            - name: Write latest.json
              shell: pwsh
              run: |
                  $ver = "${{ github.ref_name }}".TrimStart('v')
                  $tag = "${{ github.ref_name }}"
                  $url = "https://github.com/${{ github.repository }}/releases/download/$tag/Setup_NovelTrad-v$ver.exe"
                  $obj = [ordered]@{
                      version      = $ver
                      release_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
                      download_url = $url
                      sha256       = "${{ steps.sha.outputs.sha256 }}"
                  }
                  $obj | ConvertTo-Json -Depth 5 | Out-File -FilePath $env:GITHUB_WORKSPACE\latest.json -Encoding utf8

            - name: Upload installer artifact
              uses: actions/upload-artifact@v4
              with:
                  name: NovelTrad-installer
                  path: |
                      Setup_NovelTrad.exe
                      latest.json

            - name: Create draft GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  name: ${{ github.ref_name }}
                  draft: true
                  prerelease: false
                  generate_release_notes: true
                  files: |
                      Setup_NovelTrad.exe
                      latest.json
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
