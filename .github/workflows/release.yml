name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build setup EXE
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller build.spec --noconfirm

      - name: Write VERSION
        run: python -c "from pathlib import Path; import src; (Path('dist') / 'NovelTrad' / 'VERSION').write_text(src.__version__ + '\n')"

      - name: Build Inno Setup installer
        run: |
          $version = python -c "import src; print(src.__version__, end='')"
          echo "NOVELTRAD_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DNOVELTRAD_VERSION=$version" NovelTrad.iss

      - name: Upload installer to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $setup_exe = "Setup_NovelTrad-v$env:NOVELTRAD_VERSION.exe"
          gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --notes "Build automatique" --latest || true
          gh release upload ${{ github.ref_name }} "$setup_exe" --clobber
