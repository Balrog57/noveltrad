name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHONUNBUFFERED: "1"
  QT_QPA_PLATFORM: offscreen

jobs:
  test:
    name: test py${{ matrix.python }} ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest]
        include:
          - os: windows-latest
            python: "3.12"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libxcb-cursor0 2>/dev/null || true

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e . 2>/dev/null || pip install -r requirements.txt

      - name: Optional deps (smoke-test only)
        run: |
          pip install pyinstaller

      - name: Compile check
        run: python -m compileall src

      - name: Run tests
        run: python -m unittest discover tests -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-py${{ matrix.python }}
          path: |
            test-results/
            *.log
          if-no-files-found: ignore
