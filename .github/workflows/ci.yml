name: NovelTrad CI

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    validate:
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: ["windows-latest", "ubuntu-latest"]
                python-version: ["3.11", "3.12"]

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install Linux Qt runtime deps
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libegl1 libxcb-cursor0

            - name: Install runtime deps
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Compile sources
              run: python -m compileall src

            - name: Run unit tests
              env:
                  NOVELTRAD_FAKE_LLM: "1"
                  NOVELTRAD_TRANSLATION_TEST_MODE: "1"
                  QT_QPA_PLATFORM: "offscreen"
              run: python -m unittest discover -s tests -p "test_*.py"

            - name: Run corpus regression check
              run: python -m tests.corpus.evaluate > corpus-report.json

            - name: Upload corpus report
              uses: actions/upload-artifact@v4
              with:
                  name: corpus-report-${{ matrix.os }}-py${{ matrix.python-version }}
                  path: corpus-report.json
                  if-no-files-found: error
