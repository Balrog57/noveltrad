name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  checks:
    name: Type check + Lint + Tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check --workspace=apps/desktop

      - name: Lint
        run: npm run lint --workspace=apps/desktop
        continue-on-error: true

      - name: Unit tests
        run: npm run test --workspace=apps/desktop
