name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run type-check --workspace=apps/desktop
      - run: npm run test
      - run: npm run lint --workspace=apps/desktop
        continue-on-error: true
      - run: npx --workspace=apps/desktop electron-vite build
