<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFF5F7;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#FCE4EC;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F8BBD9;stop-opacity:1"/>
    </radialGradient>
    <linearGradient id="bookLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB5C2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FF8FAB;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bookRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5F5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D4A5F0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFF8F0;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#CC6688" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sparkleGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="244"/>
    </clipPath>
  </defs>

  <!-- Background circle - this IS the icon shape -->
  <circle cx="256" cy="256" r="248" fill="url(#bgGrad)" stroke="#FFB5D0" stroke-width="2"/>

  <g clip-path="url(#circleClip)">
    <!-- Decorative dots -->
    <circle cx="140" cy="120" r="6" fill="#FFD5E5" opacity="0.7"/>
    <circle cx="370" cy="110" r="4" fill="#E8D5F5" opacity="0.7"/>
    <circle cx="110" cy="380" r="5" fill="#B5DEFF" opacity="0.6"/>
    <circle cx="400" cy="390" r="7" fill="#FFD5E5" opacity="0.6"/>
    <circle cx="180" cy="90" r="3" fill="#FFE5B5" opacity="0.5"/>
    <circle cx="340" cy="420" r="4" fill="#B5DEFF" opacity="0.5"/>
  </g>

  <!-- BOOK -->
  <g filter="url(#shadow)">
    <path d="M100,220 Q100,160 130,140 L250,80 L250,280 L130,340 Q100,320 100,260 Z" fill="#E07A99" opacity="0.4"/>
    <path d="M412,220 Q412,160 382,140 L262,80 L262,280 L382,340 Q412,320 412,260 Z" fill="#C48AD9" opacity="0.4"/>
    <path d="M105,215 Q105,165 132,145 L246,90 L246,270 L132,325 Q105,305 105,255 Z" fill="url(#bookLeft)" stroke="#FF8FAB" stroke-width="1.5"/>
    <path d="M407,215 Q407,165 380,145 L266,90 L266,270 L380,325 Q407,305 407,255 Z" fill="url(#bookRight)" stroke="#D4A5F0" stroke-width="1.5"/>
    <path d="M115,210 Q115,168 137,150 L240,100 L240,262 L137,312 Q115,294 115,252 Z" fill="url(#pageGrad)" stroke="#E8E0D8" stroke-width="1"/>
    <path d="M397,210 Q397,168 375,150 L272,100 L272,262 L375,312 Q397,294 397,252 Z" fill="url(#pageGrad)" stroke="#E8E0D8" stroke-width="1"/>
    <line x1="125" y1="170" x2="230" y2="115" stroke="#E8E0D8" stroke-width="0.8" opacity="0.5"/>
    <line x1="125" y1="185" x2="230" y2="130" stroke="#E8E0D8" stroke-width="0.8" opacity="0.5"/>
    <line x1="125" y1="200" x2="230" y2="145" stroke="#E8E0D8" stroke-width="0.8" opacity="0.5"/>
    <line x1="125" y1="215" x2="230" y2="160" stroke="#E8E0D8" stroke-width="0.8" opacity="0.5"/>
    <line x1="387" y1="170" x2="282" y2="115" stroke="#E8E0D8" stroke-width="0.8" opacity="0.5"/>
    <line x1="387" y1="185" x2="282" y2="130" stroke="#E8E0D8" stroke-width="0.8" opacity="0.5"/>
    <line x1="387" y1="200" x2="282" y2="145" stroke="#E8E0D8" stroke-width="0.8" opacity="0.5"/>
    <line x1="387" y1="215" x2="282" y2="160" stroke="#E8E0D8" stroke-width="0.8" opacity="0.5"/>
    <line x1="256" y1="88" x2="256" y2="272" stroke="#D488A8" stroke-width="2.5" opacity="0.6"/>
    <path d="M248,88 L248,55 Q256,60 264,55 L264,88 Z" fill="#FF6B8A"/>
    <path d="M256,60 L248,55 Q256,50 264,55 Z" fill="#E05575"/>
  </g>

  <!-- KAWAII FACE -->
  <g>
    <ellipse cx="220" cy="200" rx="14" ry="16" fill="#2D2D3D"/>
    <ellipse cx="220" cy="197" rx="10" ry="10" fill="#1A1A2E"/>
    <ellipse cx="216" cy="192" rx="5" ry="4" fill="#FFFFFF" opacity="0.9"/>
    <ellipse cx="224" cy="200" rx="2.5" ry="2" fill="#FFFFFF" opacity="0.6"/>
    <polygon points="220,178 222,183 227,183 223,186 224,191 220,188 216,191 217,186 213,183 218,183" fill="#FFE066" filter="url(#sparkleGlow)"/>
  </g>
  <g>
    <ellipse cx="292" cy="200" rx="14" ry="16" fill="#2D2D3D"/>
    <ellipse cx="292" cy="197" rx="10" ry="10" fill="#1A1A2E"/>
    <ellipse cx="288" cy="192" rx="5" ry="4" fill="#FFFFFF" opacity="0.9"/>
    <ellipse cx="296" cy="200" rx="2.5" ry="2" fill="#FFFFFF" opacity="0.6"/>
    <polygon points="292,178 294,183 299,183 295,186 296,191 292,188 288,191 289,186 285,183 290,183" fill="#FFE066" filter="url(#sparkleGlow)"/>
  </g>

  <ellipse cx="198" cy="218" rx="12" ry="6" fill="#FF8A9B" opacity="0.4" filter="url(#glow)"/>
  <ellipse cx="314" cy="218" rx="12" ry="6" fill="#FF8A9B" opacity="0.4" filter="url(#glow)"/>
  <path d="M240,219 Q256,235 272,219" fill="none" stroke="#2D2D3D" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M244,224 Q256,232 268,224" fill="none" stroke="#FF8A9B" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- SPARKLE STARS -->
  <g filter="url(#sparkleGlow)">
    <polygon points="120,150 124,162 136,162 126,170 130,182 120,174 110,182 114,170 104,162 116,162" fill="#FFE066" opacity="0.9"/>
    <polygon points="400,140 403,149 412,149 405,155 408,164 400,158 392,164 395,155 388,149 397,149" fill="#FFE066" opacity="0.85"/>
    <polygon points="90,270 92,276 98,276 93,280 95,286 90,282 85,286 87,280 82,276 88,276" fill="#B5DEFF" opacity="0.8"/>
    <polygon points="422,260 424,266 430,266 425,270 427,276 422,272 417,276 419,270 414,266 420,266" fill="#E8D5F5" opacity="0.8"/>
  </g>

  <!-- "NovelTrad" bubble below book -->
  <g filter="url(#shadow)">
    <rect x="145" y="365" width="222" height="48" rx="24" ry="24" fill="#FF8FAB"/>
    <text x="256" y="389" text-anchor="middle" dominant-baseline="central"
          font-family="'Comic Sans MS', 'Segoe UI', 'Arial Rounded MT Bold', Arial, sans-serif"
          font-size="28" font-weight="bold" fill="#FFFFFF" letter-spacing="3">
      NovelTrad
    </text>
  </g>

  <!-- Hearts -->
  <g opacity="0.6">
    <path d="M160,310 C160,306 164,304 166,306 C168,304 172,306 172,310 C172,316 166,320 166,320 C166,320 160,316 160,310 Z" fill="#FF6B8A"/>
    <path d="M345,300 C345,297 348,295 350,297 C352,295 355,297 355,300 C355,305 350,308 350,308 C350,308 345,305 345,300 Z" fill="#D4A5F0"/>
  </g>
</svg>
